
<!DOCTYPE html><html lang="zh-CN"><head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
    <title>在线客服</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body, html { 
            height: 100vh; 
            width: 100vw;
            overflow: hidden; 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #f5f5f5;
        }
        
        #loader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity 0.3s ease;
        }
        
        #loader.hidden {
            opacity: 0;
            pointer-events: none;
        }
        
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #e0e0e0;
            border-top-color: #1890ff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .loader-text {
            margin-top: 16px;
            color: #666;
            font-size: 14px;
        }
        
        iframe { 
            width: 100%; 
            height: 100vh;
            border: none;
            display: none;
        }
        
        iframe.loaded {
            display: block;
        }
        
        .error-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #ffffff;
            z-index: 10000;
            padding: 20px;
            text-align: center;
        }
        
        .error-container.active {
            display: flex;
        }
        
        .error-icon {
            font-size: 48px;
            margin-bottom: 16px;
        }
        
        .error-title {
            font-size: 18px;
            color: #333;
            margin-bottom: 8px;
        }
        
        .error-message {
            font-size: 14px;
            color: #666;
            margin-bottom: 20px;
            max-width: 400px;
            line-height: 1.5;
        }
        
        .retry-btn {
            padding: 10px 24px;
            background: #1890ff;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 14px;
            cursor: pointer;
            transition: background 0.3s;
        }
        
        .retry-btn:hover {
            background: #40a9ff;
        }
        
        .test-message {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 16px;
            color: #52c41a;
            display: none;
            align-items: center;
            gap: 8px;
        }
        
        .test-message.active {
            display: flex;
        }
    </style></head>
<body>
    <!-- 加载动画 -->
    <div id="loader">
        <div class="spinner"></div>
        <div class="loader-text">正在加载...</div>
    </div>
    
    <!-- 错误提示 -->
    <div class="error-container" id="errorContainer">
        <div class="error-icon">⚠️</div>
        <div class="error-title" id="errorTitle">加载失败</div>
        <div class="error-message" id="errorMessage">请检查链接是否正确</div>
        <button class="retry-btn" onclick="location.reload()">重新加载</button>
    </div>
    
    <!-- 测试信息 -->
    <div class="test-message" id="testMessage">
        <span>✓</span>
        <span>凯子测试接口正常</span>
    </div>
    
    <!-- iframe -->
    <iframe id="embeddedPage" sandbox="allow-scripts allow-same-origin allow-forms allow-popups"></iframe>

    <script>
        (function() {
            'use strict';
            
            // 配置
            const CONFIG = {
                PROXY_URL: 'https://xsfhzc.xsfhjkopk.qzz.io/css/proxy.php',
                TIMEOUT: 10000, // 10秒超时
                DEFAULT_TITLE: '在线客服'
            };
            
            // DOM 元素
            const elements = {
                iframe: document.getElementById('embeddedPage'),
                loader: document.getElementById('loader'),
                errorContainer: document.getElementById('errorContainer'),
                errorTitle: document.getElementById('errorTitle'),
                errorMessage: document.getElementById('errorMessage'),
                testMessage: document.getElementById('testMessage')
            };
            
            /**
             * 获取 URL 参数
             */
            function getQueryParam(param) {
                try {
                    return new URLSearchParams(window.location.search).get(param);
                } catch (e) {
                    console.error('获取参数失败:', e);
                    return null;
                }
            }
            
            /**
             * 安全的 Base64 URL 解码
             */
            function decodeBase64Url(encodedUrl) {
                if (!encodedUrl || typeof encodedUrl !== 'string') {
                    throw new Error('无效的编码参数');
                }
                
                try {
                    // 处理 Base64 URL 安全字符
                    const base64 = encodedUrl
                        .replace(/-/g, '+')
                        .replace(/_/g, '/')
                        .replace(/\s/g, ''); // 移除空白字符
                    
                    // 补齐 Base64 填充
                    const padding = 4 - (base64.length % 4);
                    if (padding !== 4) {
                        base64 += '='.repeat(padding);
                    }
                    
                    const decoded = atob(base64);
                    return decodeURIComponent(escape(decoded));
                } catch (e) {
                    throw new Error('Base64 解码失败: ' + e.message);
                }
            }
            
            /**
             * 验证 URL 是否安全
             */
            function isValidUrl(url) {
                if (!url || typeof url !== 'string') {
                    return false;
                }
                
                try {
                    const parsed = new URL(url);
                    // 只允许 http 和 https 协议
                    return parsed.protocol === 'http:' || parsed.protocol === 'https:';
                } catch (e) {
                    return false;
                }
            }
            
            /**
             * 显示错误
             */
            function showError(title, message) {
                elements.loader.classList.add('hidden');
                elements.errorTitle.textContent = title || '加载失败';
                elements.errorMessage.textContent = message || '请检查链接是否正确';
                elements.errorContainer.classList.add('active');
            }
            
            /**
             * 隐藏加载器，显示 iframe
             */
            function showIframe() {
                elements.loader.classList.add('hidden');
                elements.iframe.classList.add('loaded');
            }
            
            /**
             * 显示测试信息
             */
            function showTestMessage() {
                elements.loader.classList.add('hidden');
                elements.testMessage.classList.add('active');
            }
            
            /**
             * 设置页面标题
             */
            function setPageTitle(title) {
                document.title = title || CONFIG.DEFAULT_TITLE;
            }
            
            /**
             * 获取远程页面标题
             */
            async function fetchPageTitle(url) {
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), CONFIG.TIMEOUT);
                
                try {
                    const response = await fetch(
                        `${CONFIG.PROXY_URL}?url=${encodeURIComponent(url)}`,
                        { signal: controller.signal }
                    );
                    
                    clearTimeout(timeoutId);
                    
                    if (!response.ok) {
                        throw new Error(`代理请求失败: ${response.status}`);
                    }
                    
                    const data = await response.json();
                    return data.title;
                } catch (error) {
                    if (error.name === 'AbortError') {
                        console.warn('获取标题超时');
                    } else {
                        console.error('获取标题失败:', error);
                    }
                    return null;
                }
            }
            
            /**
             * 初始化
             */
            async function init() {
                const encodedUrl = getQueryParam('y');
                
                // 没有参数，显示测试信息
                if (!encodedUrl) {
                    showTestMessage();
                    setPageTitle(CONFIG.DEFAULT_TITLE);
                    return;
                }
                
                let decodedUrl;
                
                // 解码 URL
                try {
                    decodedUrl = decodeBase64Url(encodedUrl);
                } catch (error) {
                    showError('链接解码失败', error.message);
                    return;
                }
                
                // 验证 URL
                if (!isValidUrl(decodedUrl)) {
                    showError('链接格式错误', '请提供有效的 http 或 https 链接');
                    return;
                }
                
                // 设置 iframe src
                elements.iframe.src = decodedUrl;
                
                // 监听 iframe 加载
                elements.iframe.onload = function() {
                    showIframe();
                };
                
                elements.iframe.onerror = function() {
                    showError('页面加载失败', '无法加载目标页面，请检查链接是否可访问');
                };
                
                // 获取页面标题
                const title = await fetchPageTitle(decodedUrl);
                setPageTitle(title);
                
                // 超时处理
                setTimeout(() => {
                    if (!elements.iframe.classList.contains('loaded')) {
                        showIframe(); // 超时后仍然显示 iframe
                    }
                }, CONFIG.TIMEOUT);
            }
            
            // 启动
            init();
        })();
    </script>

</body></html>
